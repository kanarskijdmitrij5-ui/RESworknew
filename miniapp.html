<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TimeTracker — Панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;font-size:15px;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh}
#content{flex:1;overflow-y:auto;padding-bottom:4px}
.tab-pane{display:none;padding:16px}
.tab-pane.active{display:block}
/* TAB BAR */
#tab-bar{display:flex;align-items:stretch;background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-top:1px solid rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--tg-theme-hint-color,#999);font-size:10px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:color .15s}
.tab-btn svg{width:22px;height:22px;stroke-width:1.7;transition:transform .15s}
.tab-btn.active{color:var(--tg-theme-button-color,#2481cc)}
.tab-btn.active svg{transform:scale(1.1)}
/* METRICS */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-radius:14px;padding:14px 12px}
.metric-label{font-size:11px;color:var(--tg-theme-hint-color,#999);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;line-height:1.1}
.metric-value.green{color:#29a867}
.metric-value.blue{color:var(--tg-theme-button-color,#2481cc)}
.metric-value.amber{color:#e89c24}
/* SECTION */
.section-title{font-size:13px;font-weight:600;letter-spacing:.4px;color:var(--tg-theme-hint-color,#999);text-transform:uppercase;margin:0 0 8px}
.card{background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-radius:14px;padding:14px 16px;margin-bottom:10px}
/* EMPLOYEES */
.emp-card{display:flex;align-items:center;gap:12px;background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;width:100%;text-align:left;transition:opacity .15s}
.emp-card:active{opacity:.7}
.emp-avatar{width:40px;height:40px;border-radius:50%;background:var(--tg-theme-button-color,#2481cc);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emp-avatar.on-shift{background:#29a867}
.emp-info{flex:1;min-width:0}
.emp-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-meta{font-size:12px;color:var(--tg-theme-hint-color,#999);margin-top:2px}
.emp-earn{font-size:14px;font-weight:600;text-align:right;flex-shrink:0}
.emp-earn.live{color:#29a867}
.dot-live{display:inline-block;width:6px;height:6px;border-radius:50%;background:#29a867;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* MONTH */
.month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 10px;color:var(--tg-theme-button-color,#2481cc)}
.month-label{font-weight:600;font-size:15px}
/* STARS */
.star{font-size:28px;cursor:pointer;opacity:.3;transition:opacity .1s,transform .1s;display:inline-block}
.star.active{opacity:1;transform:scale(1.1)}
/* PROJECTS */
.project-card{background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.project-name{font-weight:600;font-size:15px;margin-bottom:4px}
.project-meta{font-size:12px;color:var(--tg-theme-hint-color,#999)}
.project-status{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.status-active{background:#d1f5e0;color:#1a7a3a}
.status-completed{background:#f0f0f0;color:#999}
.status-planned{background:#dff0ff;color:#1a5fa8}
.project-actions{display:flex;gap:8px;margin-top:10px}
/* CALENDAR */
.view-toggle{display:flex;gap:6px;margin-bottom:12px}
.view-toggle button{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--tg-theme-secondary-bg-color,#f4f4f4);color:var(--tg-theme-hint-color,#999);transition:all .15s}
.view-toggle button.active{background:var(--tg-theme-button-color,#2481cc);color:var(--tg-theme-button-text-color,#fff)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tg-theme-button-color,#2481cc);padding:4px 10px}
.cal-month{font-weight:700;font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;color:var(--tg-theme-hint-color,#999);padding:6px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;position:relative;font-size:14px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:background .1s}
.cal-day:active{opacity:.7}
.cal-day.other-month{color:var(--tg-theme-hint-color,#999);opacity:.4}
.cal-day.today{background:var(--tg-theme-button-color,#2481cc);color:var(--tg-theme-button-text-color,#fff)}
.cal-day.has-event{font-weight:700}
.cal-day .event-dot{position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:#f0a030}
.cal-day.today .event-dot{background:#fff}
.cal-event-list{margin-top:12px}
.cal-event-item{padding:12px 14px;background:var(--tg-theme-secondary-bg-color,#f4f4f4);border-radius:12px;margin-bottom:8px;cursor:pointer;border:none;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.cal-event-item:active{opacity:.7}
.cal-event-time{font-size:11px;color:var(--tg-theme-hint-color,#999);margin-bottom:3px}
.cal-event-name{font-weight:600;font-size:14px}
.cal-event-total{font-size:13px;color:#29a867;margin-top:2px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;width:100%}
.btn:active{opacity:.7}
.btn-primary{background:var(--tg-theme-button-color,#2481cc);color:var(--tg-theme-button-text-color,#fff)}
.btn-secondary{background:var(--tg-theme-secondary-bg-color,#f4f4f4);color:var(--tg-theme-text-color,#000)}
.btn-danger{background:#ffe5e5;color:#cc2424}
.btn-sm{padding:7px 12px;font-size:13px;width:auto;flex:1}
.btn-row{display:flex;gap:8px}
/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;opacity:0;transition:opacity .25s}
.sheet-overlay.open{display:block}
.sheet-overlay.visible{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--tg-theme-bg-color,#fff);border-radius:18px 18px 0 0;padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 20px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);max-height:85vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.15);margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}
/* FIELDS */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--tg-theme-hint-color,#999);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--tg-theme-secondary-bg-color,#f4f4f4);border:1.5px solid transparent;border-radius:10px;font-size:15px;color:var(--tg-theme-text-color,#000);-webkit-appearance:none;appearance:none;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--tg-theme-button-color,#2481cc)}
.field textarea{min-height:80px;resize:none}
/* LOADER */
.loader{text-align:center;padding:40px 0;color:var(--tg-theme-hint-color,#999);font-size:14px}
.loader-spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--tg-theme-secondary-bg-color,#f4f4f4);border-top-color:var(--tg-theme-button-color,#2481cc);animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 16px;color:var(--tg-theme-hint-color,#999);font-size:14px}
/* SALARY */
.salary-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:14px}
.salary-row:last-child{border-bottom:none}
.salary-row .label{color:var(--tg-theme-hint-color,#999)}
.salary-row .val{font-weight:600}
.salary-total{font-size:18px;font-weight:700;color:#29a867}
/* AUTH SCREEN */
#auth-screen{position:fixed;inset:0;background:var(--tg-theme-bg-color,#fff);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;padding:32px}
#auth-screen .icon{font-size:48px}
#auth-screen h2{font-size:20px;font-weight:700;text-align:center}
#auth-screen p{font-size:14px;color:var(--tg-theme-hint-color,#999);text-align:center}
</style>
</head>
<body>
<div id="auth-screen"><div class="loader-spinner"></div><p>Загрузка...</p></div>
<div id="app" style="display:none">
  <div id="content">
    <div id="tab-overview" class="tab-pane active">
      <div class="metrics-grid">
        <div class="metric-card"><div class="metric-label">К выплате</div><div class="metric-value green" id="m-payout">—</div></div>
        <div class="metric-card"><div class="metric-label">Сотрудников</div><div class="metric-value blue" id="m-employees">—</div></div>
        <div class="metric-card"><div class="metric-label">Часов за месяц</div><div class="metric-value" id="m-hours">—</div></div>
        <div class="metric-card"><div class="metric-label">На смене сейчас</div><div class="metric-value amber" id="m-onshift">—</div></div>
      </div>
      <div class="section-title">Прогноз ФОТ</div>
      <div class="card" id="forecast-card"><div class="loader"><div class="loader-spinner"></div></div></div>
      <div style="margin-top:16px"><div class="section-title">На смене сейчас</div><div id="on-shift-list"><div class="loader"><div class="loader-spinner"></div></div></div></div>
    </div>
    <div id="tab-employees" class="tab-pane">
      <div class="month-row">
        <button class="month-nav" id="month-prev">‹</button>
        <span class="month-label" id="month-label">...</span>
        <button class="month-nav" id="month-next">›</button>
      </div>
      <div id="emp-list"><div class="loader"><div class="loader-spinner"></div></div></div>
        <div id="tab-projects" class="tab-pane">
      <div class="view-toggle">
        <button id="view-list-btn" class="active" onclick="switchProjectView('list')">&#x1F4CB; Список</button>
        <button id="view-cal-btn" onclick="switchProjectView('calendar')">&#x1F4C5; Календарь</button>
      </div>
      <!-- List view -->
      <div id="projects-list-view">
        <div class="btn-row" style="margin-bottom:16px"><button class="btn btn-primary" onclick="openCreateProject()">&#x2795; Создать проект</button></div>
        <div id="projects-list"><div class="loader"><div class="loader-spinner"></div></div></div>
      </div>
      <!-- Calendar view -->
      <div id="projects-cal-view" style="display:none">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span class="cal-month" id="cal-month-label">...</span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-event-list" id="cal-events"></div>
      </div>
    </div>
    <div id="tab-templates" class="tab-pane">
      <div class="btn-row" style="margin-bottom:16px"><button class="btn btn-primary" onclick="openCreateTemplate()">➕ Новый шаблон</button></div>
      <div id="templates-list"><div class="loader"><div class="loader-spinner"></div></div></div>
    </div>
    <div id="tab-expenses" class="tab-pane">
      <div class="section-title" style="margin-bottom:12px">Чеки сотрудников</div>
      <div id="expenses-total" class="card" style="margin-bottom:12px;display:none">
        <div class="salary-row"><span class="label">Всего расходов</span><span class="val" id="exp-total-count">—</span></div>
        <div class="salary-row"><span class="label">Общая сумма</span><span class="val salary-total" id="exp-total-sum">—</span></div>
      </div>
      <div id="expenses-list"><div class="loader"><div class="loader-spinner"></div></div></div>
    </div>
  </div>
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Обзор</span></button>
    <button class="tab-btn" data-tab="employees"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>Сотрудники</span></button>
    <button class="tab-btn" data-tab="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Проекты</span></button>
    <button class="tab-btn" data-tab="templates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg><span>Шаблоны</span></button>
    <button class="tab-btn" data-tab="expenses"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg><span>Расходы</span></button>
  </nav>
</div>
<!-- Calendar event detail sheet -->
<div class="sheet-overlay" id="calev-overlay" onclick="closeSheet('calev')"></div>
<div class="sheet" id="calev-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="calev-title">Мероприятие</div>
  <div id="calev-body"></div>
</div>
<!-- SHEETS -->
<div class="sheet-overlay" id="emp-overlay" onclick="closeSheet('emp')"></div>
<div class="sheet" id="emp-sheet"><div class="sheet-handle"></div><div class="sheet-title" id="emp-sheet-title">Сотрудник</div><div id="emp-sheet-body"></div></div>
<div class="sheet-overlay" id="proj-overlay" onclick="closeSheet('proj')"></div>
<div class="sheet" id="proj-sheet"><div class="sheet-handle"></div><div class="sheet-title">Новый проект</div>
  <div class="field"><label>Название</label><input id="proj-name" placeholder="Например: Свадьба Ивановых"/></div>
  <div class="field"><label>Локация</label><input id="proj-location" placeholder="Адрес"/></div>
  <div class="field"><label>Дата</label><input id="proj-date" type="date"/></div>
  <button class="btn btn-primary" onclick="createProject()" style="margin-top:4px">Создать</button>
</div>
<div class="sheet-overlay" id="tmpl-overlay" onclick="closeSheet('tmpl')"></div>
<div class="sheet" id="tmpl-sheet"><div class="sheet-handle"></div><div class="sheet-title">Новый шаблон</div>
  <div class="field"><label>Название</label><input id="tmpl-name" placeholder="Например: Свадьба стандарт"/></div>
  <div class="field"><label>Локация</label><input id="tmpl-location" placeholder="Адрес"/></div>

</div>
<div class="sheet-overlay" id="usetmpl-overlay" onclick="closeSheet('usetmpl')"></div>
<div class="sheet" id="usetmpl-sheet"><div class="sheet-handle"></div><div class="sheet-title" id="usetmpl-title">Создать из шаблона</div>
  <div class="field"><label>Название проекта</label><input id="usetmpl-pname" placeholder="Название"/></div>
  <div class="field"><label>Дата</label><input id="usetmpl-date" type="date"/></div>
  <input type="hidden" id="usetmpl-id"/>
  <button class="btn btn-primary" onclick="createFromTemplate()" style="margin-top:4px">Создать</button>
</div>
<div class="sheet-overlay" id="rpt-overlay" onclick="closeSheet('rpt')"></div>
<div class="sheet" id="rpt-sheet"><div class="sheet-handle"></div><div class="sheet-title" id="rpt-title">Отчёт</div><div id="rpt-body"><div class="loader"><div class="loader-spinner"></div></div></div></div>
<script>
'use strict';
const tg=window.Telegram?.WebApp;
const ADMIN_IDS=[742587575,64408195];
const BASE_URL=window.location.origin;
const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
let viewMonth=new Date().getMonth()+1,viewYear=new Date().getFullYear();
let allEmployees=[],allRatings={},currentReportProject=null;
let calMonth=new Date().getMonth()+1,calYear=new Date().getFullYear();
let calGolova=[];
let currentProjectView='list';

(async()=>{
  if(!tg){document.getElementById('auth-screen').innerHTML='<div class="icon">🚫</div><h2>Только в Telegram</h2><p>Открой через бот</p>';return;}
  tg.ready();tg.expand();tg.BackButton.hide();
  const userId=tg.initDataUnsafe?.user?.id;
  if(!ADMIN_IDS.includes(userId)){document.getElementById('auth-screen').innerHTML='<div class="icon">🔒</div><h2>Нет доступа</h2><p>Только для администраторов</p>';return;}
  allRatings=await getCloudRatings();
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  setupTabs();
  await loadOverview();
  setInterval(()=>loadOverview(),60000);
})();

function getCloudRatings(){return new Promise(r=>{if(!tg?.CloudStorage)return r({});tg.CloudStorage.getItem('ratings',(e,v)=>{if(e||!v)return r({});try{r(JSON.parse(v))}catch{r({})}});});}
function saveCloudRatings(){return new Promise(r=>{if(!tg?.CloudStorage)return r();tg.CloudStorage.setItem('ratings',JSON.stringify(allRatings),r);});}

async function api(path,opts={}){const res=await fetch(BASE_URL+path,{...opts,headers:{'Content-Type':'application/json','X-TG-Init-Data':tg?.initData||'',...(opts.headers||{})}});if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}

function setupTabs(){document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{const tab=btn.dataset.tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-'+tab).classList.add('active');haptic('light');if(tab==='employees')loadEmployees();
      if(tab==='projects')loadProjects();
      if(tab==='templates')loadTemplates();
      if(tab==='expenses')loadExpenses();});});}

function haptic(t='light'){tg?.HapticFeedback?.impactOccurred(t);}
function hapticNotif(t='success'){tg?.HapticFeedback?.notificationOccurred(t);}
function initials(n=''){return n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';}
function fmtMoney(n){if(n==null||isNaN(n))return'—';return Math.round(n).toLocaleString('ru-RU')+' ₽';}
function fmtHours(n){if(n==null||isNaN(n))return'—';const h=Math.floor(n),m=Math.round((n-h)*60);return m?h+'ч '+m+'мин':h+'ч';}
function todayISO(){return new Date().toISOString().slice(0,10);}
function openSheet(n){const o=document.getElementById(n+'-overlay'),s=document.getElementById(n+'-sheet');o.style.display='block';requestAnimationFrame(()=>{o.classList.add('open','visible');s.classList.add('open');});}
function closeSheet(n){const o=document.getElementById(n+'-overlay'),s=document.getElementById(n+'-sheet');o.classList.remove('visible');s.classList.remove('open');setTimeout(()=>{o.classList.remove('open');o.style.display='none';},300);}

async function loadOverview(){
  try{
    const[empData,fcData]=await Promise.all([api('/employees'),api('/payroll-forecast')]);
    allEmployees=empData.employees||[];
    const onShift=allEmployees.filter(e=>e.on_shift);
    const totalH=allEmployees.reduce((s,e)=>s+(e.total_hours||0),0);
    document.getElementById('m-employees').textContent=allEmployees.length;
    document.getElementById('m-hours').textContent=fmtHours(totalH);
    document.getElementById('m-onshift').textContent=onShift.length;
    document.getElementById('m-payout').textContent=fmtMoney(fcData.total_fact||0);

document.getElementById('month-prev').addEventListener('click',()=>{if(viewMonth===1){viewMonth=12;viewYear--;}else viewMonth--;renderEmpList();haptic('light');});

function empCardHTML(e){

        <div class="salary-row"><span class="label">Штрафы</span><span class="val" style="color:#cc2424">-${fmtMoney(d.penalties)}</span></div>
        <div class="salary-row" style="border-top:1px solid rgba(0,0,0,.1);margin-top:4px;padding-top:10px">

      </div>
      <div class="btn-row"><a href="tg://user?id=${id}" class="btn btn-secondary btn-sm">💬 Написать</a></div>`;

// ── CALENDAR ────────────────────────────
function switchProjectView(view){
  currentProjectView=view;
  document.getElementById('view-list-btn').classList.toggle('active',view==='list');
  document.getElementById('view-cal-btn').classList.toggle('active',view==='calendar');
  document.getElementById('projects-list-view').style.display=view==='list'?'block':'none';
  document.getElementById('projects-cal-view').style.display=view==='calendar'?'block':'none';
  if(view==='calendar'){loadCalendar();}
  haptic('light');
}

document.getElementById('cal-prev').addEventListener('click',()=>{
  if(calMonth===1){calMonth=12;calYear--;}else calMonth--;
  loadCalendar();haptic('light');
});
document.getElementById('cal-next').addEventListener('click',()=>{
  if(calMonth===12){calMonth=1;calYear++;}else calMonth++;
  loadCalendar();haptic('light');
});

async function loadCalendar(){
  document.getElementById('cal-month-label').textContent=MONTHS_RU[calMonth-1]+' '+calYear;
  document.getElementById('cal-grid').innerHTML='';
  document.getElementById('cal-events').innerHTML='';
  try{
    const data=await api(`/golova/projects?month=${calMonth}&year=${calYear}`);
    calGolova=data.projects||[];
  }catch{calGolova=[];}
  renderCalendar();
}

function renderCalendar(){
  const dows=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const grid=document.getElementById('cal-grid');
  grid.innerHTML=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth-1,1);
  const lastDay=new Date(calYear,calMonth,0);
  let startDow=firstDay.getDay()||7;// 1=Mon...7=Sun
  const today=new Date();
  // Event dates index
  const eventByDay={};
  calGolova.forEach(ev=>{
    if(!ev.start_date_time)return;
    const d=ev.start_date_time.slice(8,10);
    if(!eventByDay[d])eventByDay[d]=[];
    eventByDay[d].push(ev);
  });
  // Empty cells before month start
  for(let i=1;i<startDow;i++){grid.insertAdjacentHTML('beforeend','<div></div>');}
  // Days
  for(let d=1;d<=lastDay.getDate();d++){
    const isToday=today.getDate()===d&&today.getMonth()+1===calMonth&&today.getFullYear()===calYear;
    const events=eventByDay[String(d).padStart(2,'0')]||[];
    const dayEl=document.createElement('div');
    dayEl.className='cal-day'+(isToday?' today':'')+(events.length?' has-event':'');
    dayEl.textContent=d;
    if(events.length)dayEl.insertAdjacentHTML('beforeend','<span class="event-dot"></span>');
    if(events.length){
      dayEl.addEventListener('click',()=>{selectCalDay(d,events);haptic('light');});
    }
    grid.appendChild(dayEl);
  }
  // Show today's or first events
  const todayEvents=eventByDay[String(today.getDate()).padStart(2,'0')]||[];
  if(todayEvents.length)renderCalEvents(today.getDate(),todayEvents);
  else if(calGolova.length){
    const firstEvDay=calGolova[0].start_date_time.slice(8,10);
    renderCalEvents(parseInt(firstEvDay),eventByDay[firstEvDay]||[]);
  }
}

function selectCalDay(day,events){
  document.querySelectorAll('.cal-day').forEach(el=>el.classList.remove('selected'));
  renderCalEvents(day,events);
}

function renderCalEvents(day,events){
  const el=document.getElementById('cal-events');
  if(!events||!events.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="section-title">${day} ${MONTHS_RU[calMonth-1]}</div>`+
    events.map(ev=>{
      const time=ev.start_date_time?ev.start_date_time.slice(11,16):'';
      const endTime=ev.end_date_time?ev.end_date_time.slice(11,16):'';
      return`<button class="cal-event-item" onclick="openCalEvent(${ev.id})">
        <div class="cal-event-time">${time}${endTime?'  –  '+endTime:''}</div>
        <div class="cal-event-name">${ev.name}</div>
        ${ev.total?`<div class="cal-event-total">${fmtMoney(ev.total)}</div>`:''}
      </button>`;
    }).join('');
}

async function openCalEvent(golovaId){
  const ev=calGolova.find(e=>e.id===golovaId);
  if(!ev)return;
  haptic('medium');
  document.getElementById('calev-title').textContent=ev.name;
  document.getElementById('calev-body').innerHTML='<div class="loader"><div class="loader-spinner"></div></div>';
  openSheet('calev');
  // Fetch TimeTracker data for this project name (shifts with this project)
  try{
    const [empData,fcData]=await Promise.all([
      api('/employees'),
      api('/payroll-forecast'),
    ]);
    const emps=empData.employees||[];
    const startDate=ev.start_date_time?ev.start_date_time.slice(0,10):'';
    const endDate=ev.end_date_time?ev.end_date_time.slice(0,10):startDate;
    document.getElementById('calev-body').innerHTML=`
      <div class="card" style="margin-bottom:12px">
        ${ev.status?`<div class="salary-row"><span class="label">Тип</span><span class="val">${ev.status}</span></div>`:''}
        <div class="salary-row"><span class="label">Начало</span><span class="val">${ev.start_date_time?ev.start_date_time.slice(0,16).replace('T',' ').replace(' ',', '):'—'}</span></div>
        <div class="salary-row"><span class="label">Окончание</span><span class="val">${ev.end_date_time?ev.end_date_time.slice(0,16).replace('T',' ').replace(' ',', '):'—'}</span></div>
        ${ev.venue?`<div class="salary-row"><span class="label">Площадка</span><span class="val">${typeof ev.venue==='object'?ev.venue.name||'':ev.venue}</span></div>`:''}
        <div class="salary-row"><span class="label">Сумма заказа</span><span class="val salary-total">${fmtMoney(ev.total)}</span></div>
      </div>
      <div class="section-title">Участники (смены в этот день)</div>
      ${emps.length?emps.filter(e=>{
        const s=e.on_shift;
        return s;
      }).map(e=>`<div class="card" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between"><span style="font-weight:600">${e.name}</span><span style="color:${e.on_shift?'#29a867':'var(--tg-theme-hint-color,#999)'}">${e.on_shift?'🟢 На смене':'⚫'}</span></div>
      </div>`).join(''):'<div class="empty">Нет активных смен</div>'}
      <div class="btn-row" style="margin-top:12px">
        <a href="https://renteventservice.golova.io" target="_blank" class="btn btn-secondary btn-sm">🔗 Открыть в Golova</a>
      </div>`;
  }catch{
    document.getElementById('calev-body').innerHTML='<div class="empty">Ошибка загрузки</div>';
  }
}

async function loadProjects(){
  const l=document.getElementById('projects-list');
  l.innerHTML='<div class="loader"><div class="loader-spinner"></div></div>';
  try{
    const d=await api('/projects');const projects=d.projects||d||[];
    if(!projects.length){l.innerHTML='<div class="empty">Нет проектов</div>';return;}
    l.innerHTML=projects.map(p=>projCardHTML(p)).join('');
    l.querySelectorAll('.btn-report').forEach(b=>b.addEventListener('click',()=>openReport(b.dataset.name)));
    l.querySelectorAll('.btn-complete').forEach(b=>b.addEventListener('click',()=>completeProject(b.dataset.id,b.dataset.name)));
  }catch{l.innerHTML='<div class="empty">Ошибка</div>';}
}

function projCardHTML(p){
  const sc={active:'status-active',completed:'status-completed',planned:'status-planned'}[p.status]||'status-planned';
  const sl={active:'Активный',completed:'Завершён',planned:'Планируется'}[p.status]||p.status;
  return`<div class="project-card"><div class="project-name">${p.name}</div><div class="project-meta">${p.location||''}${p.date?' · '+p.date:''}</div><span class="project-status ${sc}">${sl}</span><div class="project-actions"><button class="btn btn-secondary btn-sm btn-report" data-name="${p.name}">📋 Отчёт</button>${p.status==='active'?`<button class="btn btn-danger btn-sm btn-complete" data-id="${p.id||p.name}" data-name="${p.name}">✓ Завершить</button>`:''}</div></div>`;
}

function completeProject(id,name){
  tg.showPopup({title:'Завершить проект?',message:`«${name}» будет помечен как завершённый.`,buttons:[{id:'ok',type:'default',text:'Завершить'},{id:'cancel',type:'cancel',text:'Отмена'}]},async(b)=>{
    if(b!=='ok')return;
    try{await api(`/projects/${id}/status`,{method:'PUT',body:JSON.stringify({status:'completed'})});hapticNotif('success');loadProjects();}catch{hapticNotif('error');}
  });
}

function openCreateProject(){document.getElementById('proj-name').value='';document.getElementById('proj-location').value='';document.getElementById('proj-date').value=todayISO();haptic('light');openSheet('proj');}
async function createProject(){
  const name=document.getElementById('proj-name').value.trim();
  if(!name){tg.showAlert('Введите название проекта');return;}
  try{await api('/projects',{method:'POST',body:JSON.stringify({name,location:document.getElementById('proj-location').value.trim(),date:document.getElementById('proj-date').value,status:'active'})});hapticNotif('success');closeSheet('proj');loadProjects();}catch{hapticNotif('error');tg.showAlert('Ошибка');}
}

async function openReport(name){
  currentReportProject=name;
  document.getElementById('rpt-title').textContent='Отчёт: '+name;
  document.getElementById('rpt-body').innerHTML='<div class="loader"><div class="loader-spinner"></div></div>';
  openSheet('rpt');haptic('medium');
  try{
    const ratings=Object.entries(allRatings).map(([id,r])=>({tg_id:parseInt(id),rating:r}));
    const d=await api('/projects/report',{method:'POST',body:JSON.stringify({project_name:name,ratings})});
    const workers=d.workers||[];
    document.getElementById('rpt-body').innerHTML=`<div class="card" style="margin-bottom:12px"><div class="salary-row"><span class="label">Сотрудников</span><span class="val">${d.workers_count||workers.length}</span></div><div class="salary-row"><span class="label">Часов</span><span class="val">${fmtHours(d.total_hours)}</span></div>${d.total_sqm?`<div class="salary-row"><span class="label">Монтаж</span><span class="val">${d.total_sqm} м²</span></div>`:''}<div class="salary-row"><span class="label">ФОТ</span><span class="val salary-total">${fmtMoney(d.total_payout)}</span></div></div><div class="section-title">Состав</div>${workers.map(w=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between"><span style="font-weight:600">${w.name}</span><span style="color:#29a867;font-weight:600">${fmtMoney(w.total_earned)}</span></div><div style="font-size:12px;color:var(--tg-theme-hint-color,#999)">${fmtHours(w.hours)}${w.sqm_volume?' · '+w.sqm_volume+' м²':''}</div></div>`).join('')}<div class="btn-row" style="margin-top:8px"><button class="btn btn-primary" onclick="sendReport()">📤 Отправить в Telegram</button></div>`;
  }catch{document.getElementById('rpt-body').innerHTML='<div class="empty">Ошибка</div>';}
}

async function sendReport(){
  if(!currentReportProject)return;haptic('medium');
  try{
    const ratings=Object.entries(allRatings).map(([id,r])=>({tg_id:parseInt(id),rating:r}));
    await api('/projects/report/send-telegram',{method:'POST',body:JSON.stringify({project_name:currentReportProject,ratings})});
    hapticNotif('success');tg.showAlert('Отчёт отправлен ✅');
  }catch{hapticNotif('error');tg.showAlert('Ошибка отправки');}
}

async function loadTemplates(){
  const l=document.getElementById('templates-list');
  l.innerHTML='<div class="loader"><div class="loader-spinner"></div></div>';
  try{
    const d=await api('/project-templates');const templates=d.templates||d||[];
    if(!templates.length){l.innerHTML='<div class="empty">Нет шаблонов</div>';return;}
    l.innerHTML=templates.map(t=>tmplCardHTML(t)).join('');
    l.querySelectorAll('.btn-use').forEach(b=>b.addEventListener('click',()=>openUseTmpl(b.dataset.id,b.dataset.name)));
    l.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',()=>deleteTmpl(b.dataset.id,b.dataset.name)));
  }catch{l.innerHTML='<div class="empty">Ошибка</div>';}
}

function tmplCardHTML(t){
  return`<div class="project-card"><div class="project-name">${t.name}</div><div class="project-meta">${t.location||''}${t.duration_hours?' · '+t.duration_hours+'ч':''}</div><div class="project-actions"><button class="btn btn-primary btn-sm btn-use" data-id="${t.id}" data-name="${t.name}">➕ Создать</button><button class="btn btn-danger btn-sm btn-del" data-id="${t.id}" data-name="${t.name}">🗑</button></div></div>`;

function openUseTmpl(id,name){document.getElementById('usetmpl-id').value=id;document.getElementById('usetmpl-title').textContent='Создать из: '+name;document.getElementById('usetmpl-pname').value='';document.getElementById('usetmpl-date').value=todayISO();haptic('light');openSheet('usetmpl');}

  const id=document.getElementById('usetmpl-id').value,name=document.getElementById('usetmpl-pname').value.trim();
  if(!name){tg.showAlert('Введите название');return;}

function openCreateTemplate(){['tmpl-name','tmpl-location','tmpl-duration','tmpl-crew'].forEach(id=>document.getElementById(id).value='');haptic('light');openSheet('tmpl');}
async function createTemplate(){
  const name=document.getElementById('tmpl-name').value.trim();
  if(!name){tg.showAlert('Введите название');return;}

// ── EXPENSES ────────────────────────────
async function loadExpenses(){
  const list=document.getElementById('expenses-list');
  list.innerHTML='<div class="loader"><div class="loader-spinner"></div></div>';
  try{
    const d=await api('/expenses');
    const expenses=d.expenses||[];
    if(!expenses.length){list.innerHTML='<div class="empty">Нет расходов</div>';return;}
    // Show total card
    const totCard=document.getElementById('expenses-total');
    totCard.style.display='block';
    document.getElementById('exp-total-count').textContent=d.total_count+' шт';
    document.getElementById('exp-total-sum').textContent=fmtMoney(d.total_amount);
    // Group by employee
    const byEmp={};
    expenses.forEach(e=>{
      const key=e.employee_name||'Неизвестный';
      if(!byEmp[key])byEmp[key]=[];
      byEmp[key].push(e);
    });
    list.innerHTML=Object.entries(byEmp).map(([name,exps])=>{
      const empTotal=exps.reduce((s,e)=>s+e.amount,0);
      return`<div class="section-title" style="margin-top:8px">${name} · ${fmtMoney(empTotal)}</div>`+
      exps.map(e=>{
        const dt=e.date?e.date.slice(0,10):'';
        const proj=e.project?` <span style="color:var(--tg-theme-hint-color,#999);font-size:11px">· ${e.project}</span>`:'';
        return`<div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-weight:600;font-size:14px">${e.description}</span>
            <span style="color:#cc2424;font-weight:700">−${fmtMoney(e.amount)}</span>
          </div>
          <div style="font-size:12px;color:var(--tg-theme-hint-color,#999)">${dt}${proj}</div>
          ${e.photo_file_id?`<div style="font-size:11px;color:var(--tg-theme-button-color,#2481cc);margin-top:4px">📎 Чек прикреплён</div>`:''}
        </div>`;
      }).join('');
    }).join('');
  }catch{list.innerHTML='<div class="empty">Ошибка</div>';}
}

function deleteTmpl(id,name){
  tg.showPopup({title:'Удалить шаблон?',message:`«${name}» будет удалён.`,buttons:[{id:'ok',type:'destructive',text:'Удалить'},{id:'cancel',type:'cancel',text:'Отмена'}]},async(b)=>{
    if(b!=='ok')return;
    try{await api(`/project-templates/${id}`,{method:'DELETE'});hapticNotif('success');loadTemplates();}catch{hapticNotif('error');}
  });
}
